syntax = "proto3";

// 客户端重连请求（无参数，仅用于触发服务端回复）
message ReconnectRequest
{
    uint32 player_id = 1;
}


// 服务端回复的全量快照
message SnapshotReply
{
    uint32 player_id    = 1;
    uint32 client_frame_hint = 2;        // 建议客户端从此帧号开始继续模拟

    // 完整状态（定点数原始值，Q24.40）
    int64 x     = 3;
    int64 y     = 4;
    int64 vx    = 5;
    int64 vy    = 6;
    uint32 hp   = 7;
    int32 state = 8;        // 待机/跑动/攻击等
}