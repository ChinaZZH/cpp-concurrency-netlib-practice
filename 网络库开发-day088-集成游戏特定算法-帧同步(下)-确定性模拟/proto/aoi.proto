syntax = "proto3";

package aoi;

// ============================================================
// 实体信息
// ============================================================
message EntityInfo {
    int32 entity_id = 1;
    int32 x = 2;
    int32 y = 3;
}

// ============================================================
// 1. 新实体进入视野通知（新实体 → 周围已有实体）
//    发送给：新实体周围的所有已有实体
//    通知它们：有一个新实体进入了你的视野
// ============================================================
message EntityEnterRequest {
    int32 map_id = 1;
    EntityInfo new_entity = 2;  // 新实体的信息
}

message EntityEnterNotifyResponse {
    int32 msg_client_id = 1;  // 这条消息包所属对象
    EntityInfo new_entity = 2;  // 新实体的信息
}

// ============================================================
// 2. 初始化周围实体列表（服务器 → 新实体）
//    发送给：新实体自身
//    通知它：你周围有哪些实体
// ============================================================
message InitAroundEntitiesNotifyResponse {
    int32 msg_client_id = 1;  // 这条消息包所属对象
    repeated EntityInfo around_entities = 2;  // 新实体周围的已有实体列表
}

// ============================================================
// 3. 实体离开视野通知（离开实体 → 周围实体）
//    发送给：周围所有实体
//    通知它们：该实体已离开
// ============================================================
message EntityLeaveRequest {
    int32 map_id = 1;
    int32 entity_id = 2;  // 离开的实体ID
}

message EntityLeaveNotifyResponse {
    int32 msg_client_id = 1;  // 这条消息包所属对象
    int32 entity_id = 2;  // 离开的实体ID
}

// ============================================================
// 4. 实体移动通知（移动实体 → 周围实体）
//    发送给：周围所有实体
//    通知它们：该实体的位置发生了变化
// ============================================================
message EntityMoveRequest {
    int32 map_id = 1;
    int32 entity_id = 2;
    int32 new_x = 3;
    int32 new_y = 4;
    int64 timestamp = 5; //  客户端时间戳,发送当前时间时间戳，绝对时间。（用于延迟补偿，留作未来使用）
}

message EntityMoveNotifyResponse {
    int32 msg_client_id = 1;  // 这条消息包所属对象
    int32 entity_id = 2;
    int32 new_x = 3;
    int32 new_y = 4;
}